server {
    listen 8080;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    location /api/auth/ {
        set $auth crm_auth-service;
        proxy_pass http://$auth:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/ {
        set $user crm_user-service;
        proxy_pass http://$user:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/crm/ {
        set $crm crm_crm-service;
        proxy_pass http://$crm:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
        set $notification crm_notification-service;
        proxy_pass http://$notification:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        set $crm crm_crm-service;
        proxy_pass http://$crm:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        set $frontend crm_frontend;
        proxy_pass http://$frontend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
